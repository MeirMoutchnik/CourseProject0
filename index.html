<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
    </nav>

    <h1>Welcome to My Website</h1>
    <div class="container">
      <form action="" id="cinema-form" border="1">
        <div class="form-group">
          <label for="genre">Genre</label>
          <select name="genre" id="genre">
            <option value="action">Action</option>
            <option value="comedy">Comedy</option>
            <option value="drama">Drama</option>
            <option value="horror">Horror</option>
            <option value="science-fiction">Science Fiction</option>
            <option value="animation">Animation</option>
          </select>
        </div>

        <div class="form-group">
          <label for="film-name">Film Name</label
          ><input
            type="text"
            id="film-name"
            placeholder="Please enter film name"
            minlength="5"
          />
        </div>

        <div class="form-group">
          <label for="director">Director</label
          ><input
            type="text"
            id="director"
            placeholder="Please enter director"
            required
          />
        </div>

        <div class="form-group">
          <label for="duration">Duration</label
          ><input
            type="number"
            id="duration"
            name="duration"
            placeholder="Please enter duration"
          />
        </div>

        <div class="form-group">
          <label for="price">Price</label
          ><input
            type="number"
            id="price"
            name="price"
            placeholder="Please enter price"
          />
        </div>

        <div class="form-group">
          <label for="poster">Poster</label
          ><input
            type="url"
            id="poster"
            name="poster"
            placeholder="Please enter poster url"
          />
        </div>

        <div class="form-group">
          <label for="screening-date">Screening Date</label
          ><input
            type="date"
            id="date"
            name="date"
            placeholder="Please enter screening date"
          />
        </div>

        <button type="submit" id="submit" >Add film</button>
      </form> 
    </div>

    <div id="stats"></div>

    <table id="cinema-table" border="1">
      <thead>
        <tr>
          <th>Genre</th>
          <th>Name</th>
          <th>Director</th>
          <th>Duration</th>
          <th>Price</th>
          <th>Poster</th>
          <th>Screening Date</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody id="cinema-table-body"></tbody>
    </table>

    <div id="delete-movie-modal" hidden>
      <h2>Delete Movie</h2>
      <p>Are you sure you want to delete this movie?</p>
      <button id="delete-movie-confirm">Delete</button>
      <button id="delete-movie-cancel">Cancel</button>
    </div>

    <script src="app.js"></script>
  </body>
</html>
